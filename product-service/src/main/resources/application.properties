spring.application.name=product-service
spring.server.port=8081

spring.datasource.url=jdbc:h2:mem:products
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Custom log pattern including trace_id and span_id from MDC
#logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} [trace_id=%mdc{trace_id} span_id=%mdc{span_id}] - %msg%n
# Enable logging to a specific file
logging.file.name=C:/IBM/personalPOC/logs/product-service.log

# Define a custom pattern for that file
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n